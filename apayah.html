<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
    color:white;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#pesan{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
    display:none;
    animation:muncul 1s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🎂 Selamat Ulang Tahun 🎉</h1>

    <button onclick="showMessage()">
        Klik Aku!
    </button>

    <div id="pesan">
        🥳 Happy Birthday! 🎂<br>
        Semoga panjang umur, sehat selalu,<br>
        dan semua impianmu tercapai! 🎉
    </div>
</div>

<script>
function showMessage(){
    document.getElementById("pesan").style.display = "block";
}
</script>

</body>
</html>
